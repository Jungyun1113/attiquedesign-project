name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install chalice

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Setup Chalice Config
        working-directory: backend
        run: |
          mkdir -p .chalice
          cat > .chalice/config.json << 'ENDOFCONFIG'
          {
            "version": "2.0",
            "app_name": "attique-project",
            "stages": {
              "prod": {
                "api_gateway_stage": "api",
                "autogen_policy": false,
                "manage_iam_role": true,
                "environment_variables": {
                  "CHALICE_ENV": "prod",
                  "DATABASE_URL": "${{ secrets.DATABASE_URL }}",
                  "JWT_SECRET": "${{ secrets.JWT_SECRET }}",
                  "JWT_ALGORITHM": "HS256",
                  "ACCESS_TOKEN_EXPIRE_MINUTES": "60",
                  "REFRESH_TOKEN_EXPIRE_DAYS": "30",
                  "S3_BUCKET": "${{ secrets.AWS_S3_BUCKET }}",
                  "PRESIGN_EXPIRY_SECONDS": "300",
                  "PORTONE_API_SECRET": "${{ secrets.PORTONE_API_SECRET }}",
                  "PORTONE_WEBHOOK_SECRET": "${{ secrets.PORTONE_WEBHOOK_SECRET }}",
                  "ALLOWED_ORIGINS": "${{ secrets.ALLOWED_ORIGINS }}"
                },
                "lambda_functions": {
                  "api_handler": {
                    "lambda_memory_size": 1024,
                    "lambda_timeout": 30
                  }
                }
              }
            }
          }
          ENDOFCONFIG
          cat > .chalice/policy-prod.json << 'ENDOFPOLICY'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": [
                  "logs:CreateLogGroup",
                  "logs:CreateLogStream",
                  "logs:PutLogEvents"
                ],
                "Resource": "arn:aws:logs:*:*:*"
              },
              {
                "Effect": "Allow",
                "Action": [
                  "s3:PutObject",
                  "s3:GetObject",
                  "s3:DeleteObject",
                  "s3:ListBucket"
                ],
                "Resource": [
                  "arn:aws:s3:::${{ secrets.AWS_S3_BUCKET }}",
                  "arn:aws:s3:::${{ secrets.AWS_S3_BUCKET }}/*"
                ]
              }
            ]
          }
          ENDOFPOLICY

      - name: Configure S3 Public Access (disable block)
        run: |
          aws s3api put-public-access-block \
            --bucket "${{ secrets.AWS_S3_BUCKET }}" \
            --public-access-block-configuration \
              "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"

      - name: Configure S3 Bucket Policy (public read)
        run: |
          aws s3api put-bucket-policy \
            --bucket "${{ secrets.AWS_S3_BUCKET }}" \
            --policy "{
              \"Version\": \"2012-10-17\",
              \"Statement\": [{
                \"Sid\": \"PublicReadGetObject\",
                \"Effect\": \"Allow\",
                \"Principal\": \"*\",
                \"Action\": \"s3:GetObject\",
                \"Resource\": \"arn:aws:s3:::${{ secrets.AWS_S3_BUCKET }}/*\"
              }]
            }"

      - name: Configure S3 CORS (Safari compatible)
        run: |
          aws s3api put-bucket-cors \
            --bucket "${{ secrets.AWS_S3_BUCKET }}" \
            --cors-configuration '{
              "CORSRules": [{
                "AllowedHeaders": ["*"],
                "AllowedMethods": ["GET", "PUT", "POST", "DELETE", "HEAD"],
                "AllowedOrigins": ["*"],
                "ExposeHeaders": ["ETag", "Content-Length", "Content-Type"],
                "MaxAgeSeconds": 3000
              }]
            }'

      - name: Wait for IAM Consistency
        run: sleep 10

      - name: Deploy with Chalice
        working-directory: backend
        run: chalice deploy --stage prod
