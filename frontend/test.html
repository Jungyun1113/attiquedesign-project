<!DOCTYPE html>
<html>
<style>
  .sec-hero {
    width: 300px;
    aspect-ratio: 3/2;
    background: #ccc;
    position: relative;
  }
  img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center top;
    background: #eee;
  }
  .dots {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: red;
    width: 50px; height: 10px;
  }
</style>
<body>
  <div class="sec-hero">
    <!-- 4:3 ratio image -->
    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'><rect width='400' height='300' fill='blue'/></svg>">
    <div class="dots"></div>
  </div>
</body>
</html>
